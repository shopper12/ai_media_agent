name: Publish approved assets to GitHub Pages

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 1"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  publish-approved-assets:
    runs-on: ubuntu-latest
    env:
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
      PUBLISH_ASSETS_SHEET_NAME: ${{ vars.PUBLISH_ASSETS_SHEET_NAME || 'publish_assets' }}
      SITE_DIR: site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate static site files
        run: python scripts/publish_approved_assets_to_pages.py

      - name: Commit generated site files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Publish approved assets to site
          file_pattern: site/**

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
