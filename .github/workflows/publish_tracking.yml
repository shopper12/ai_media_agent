name: Publish tracking and performance report

on:
  workflow_dispatch:
  schedule:
    - cron: "30 1 * * 1"

jobs:
  publish-tracking:
    runs-on: ubuntu-latest
    env:
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
      SHEET_NAME: ${{ vars.SHEET_NAME || 'sheet1' }}
      PUBLISH_ASSETS_SHEET_NAME: ${{ vars.PUBLISH_ASSETS_SHEET_NAME || 'publish_assets' }}
      PUBLISHED_LOG_SHEET_NAME: ${{ vars.PUBLISHED_LOG_SHEET_NAME || 'published_log' }}
      PERFORMANCE_REPORT_SHEET_NAME: ${{ vars.PERFORMANCE_REPORT_SHEET_NAME || 'performance_report' }}
      PIPELINE_AUDIT_SHEET_NAME: ${{ vars.PIPELINE_AUDIT_SHEET_NAME || 'pipeline_audit' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up tracking sheets
        run: python scripts/setup_publish_tracking.py

      - name: Sync publish log and report
        run: python scripts/sync_publish_log.py

      - name: Audit pipeline state
        run: python scripts/audit_pipeline_state.py