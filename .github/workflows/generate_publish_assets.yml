name: Generate publish assets

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * 1"

jobs:
  generate-publish-assets:
    runs-on: ubuntu-latest
    env:
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      SHEET_NAME: ${{ vars.SHEET_NAME || 'sheet1' }}
      PUBLISH_ASSETS_SHEET_NAME: ${{ vars.PUBLISH_ASSETS_SHEET_NAME || 'publish_assets' }}
      GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
      MIN_CONTENT_QUALITY_SCORE: ${{ vars.MIN_CONTENT_QUALITY_SCORE || '75' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate publish assets
        run: python scripts/generate_publish_assets.py

      - name: Expand cross platform assets
        run: python scripts/expand_cross_platform_assets.py

      - name: Check content quality
        run: python scripts/quality_gate_assets.py