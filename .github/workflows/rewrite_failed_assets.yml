name: Rewrite failed assets

on:
  workflow_dispatch:

jobs:
  rewrite:
    runs-on: ubuntu-latest
    env:
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      PUBLISH_ASSETS_SHEET_NAME: ${{ vars.PUBLISH_ASSETS_SHEET_NAME || 'publish_assets' }}
      GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
      MIN_CONTENT_QUALITY_SCORE: ${{ vars.MIN_CONTENT_QUALITY_SCORE || '82' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python scripts/rewrite_failed_assets.py
      - run: python scripts/quality_gate_assets.py
