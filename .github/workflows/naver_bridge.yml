name: Send Naver Blog rows to bridge

on:
  workflow_dispatch:
  schedule:
    - cron: "30 1 * * 1"

jobs:
  send-naver-blog-rows:
    runs-on: ubuntu-latest
    env:
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
      PUBLISH_ASSETS_SHEET_NAME: ${{ vars.PUBLISH_ASSETS_SHEET_NAME || 'publish_assets' }}
      NAVER_BLOG_WEBHOOK_URL: ${{ secrets.NAVER_BLOG_WEBHOOK_URL }}
      NAVER_BLOG_ID: ${{ secrets.NAVER_BLOG_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send rows to bridge
        run: python scripts/publish_to_naver_blog_bridge.py
