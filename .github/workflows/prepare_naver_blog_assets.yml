name: Prepare Naver Blog assets

on:
  workflow_dispatch:
  schedule:
    - cron: "20 1 * * 1"

permissions:
  contents: write

jobs:
  prepare-naver-blog-assets:
    runs-on: ubuntu-latest
    env:
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
      PUBLISH_ASSETS_SHEET_NAME: ${{ vars.PUBLISH_ASSETS_SHEET_NAME || 'publish_assets' }}
      NAVER_BLOG_OUTBOX_DIR: outbox/naver_blog
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build Naver Blog asset files
        run: python scripts/prepare_naver_blog_posts.py

      - name: Commit prepared asset files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Prepare Naver Blog asset files
          file_pattern: outbox/naver_blog/**
