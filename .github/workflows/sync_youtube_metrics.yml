name: Sync YouTube metrics

on:
  workflow_dispatch:
  schedule:
    - cron: "15 2 * * *"

jobs:
  sync-youtube-metrics:
    runs-on: ubuntu-latest
    env:
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
      SHEET_NAME: ${{ vars.SHEET_NAME || 'sheet1' }}
      PUBLISH_ASSETS_SHEET_NAME: ${{ vars.PUBLISH_ASSETS_SHEET_NAME || 'publish_assets' }}
      STRATEGY_FEEDBACK_SHEET_NAME: ${{ vars.STRATEGY_FEEDBACK_SHEET_NAME || 'strategy_feedback' }}
      YOUTUBE_OAUTH_CLIENT_JSON: ${{ secrets.YOUTUBE_OAUTH_CLIENT_JSON }}
      YOUTUBE_OAUTH_REFRESH_TOKEN: ${{ secrets.YOUTUBE_OAUTH_REFRESH_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync YouTube metrics
        run: python scripts/sync_youtube_metrics.py

      - name: Update strategy feedback
        run: python scripts/update_strategy_from_performance.py
