name: Publish Meta Social

on:
  workflow_dispatch:
  schedule:
    - cron: "15 * * * *"

permissions:
  contents: write

jobs:
  publish-meta-social:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      PUBLISH_ASSETS_SHEET_NAME: publish_assets
      META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
      INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
      THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
      MEDIA_REPO_TOKEN: ${{ secrets.MEDIA_REPO_TOKEN }}
      MEDIA_REPO: ${{ vars.MEDIA_REPO || github.repository }}
      MEDIA_BRANCH: ${{ vars.MEDIA_BRANCH || 'main' }}
      MEDIA_OBJECT_PREFIX: ${{ vars.MEDIA_OBJECT_PREFIX || 'media' }}
      MEDIA_PUBLIC_BASE_URL: ${{ vars.MEDIA_PUBLIC_BASE_URL }}
      META_GRAPH_VERSION: ${{ vars.META_GRAPH_VERSION || 'v25.0' }}
      THREADS_GRAPH_VERSION: ${{ vars.THREADS_GRAPH_VERSION || 'v1.0' }}
      META_PUBLISH_WAIT_SECONDS: ${{ vars.META_PUBLISH_WAIT_SECONDS || '20' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Upload media files to GitHub Pages
        run: python scripts/upload_media_to_github_pages.py

      - name: Publish approved Instagram Reels and Threads rows
        run: python scripts/publish_to_meta_social.py
