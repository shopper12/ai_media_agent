name: Generate content candidates

on:
  workflow_dispatch:
  schedule:
    - cron: "0 23 * * 0"

jobs:
  generate-candidates:
    runs-on: ubuntu-latest
    env:
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
      SHEET_NAME: ${{ vars.SHEET_NAME || 'sheet1' }}
      CONTENT_STRATEGY_CONFIG: config/content_candidate_strategy.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate candidates
        run: python scripts/generate_content_candidates.py
