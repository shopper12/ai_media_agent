name: Publish YouTube Shorts

on:
  workflow_dispatch:
  schedule:
    - cron: "50 1 * * 1"

jobs:
  publish-youtube-shorts:
    runs-on: ubuntu-latest
    env:
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
      PUBLISH_ASSETS_SHEET_NAME: ${{ vars.PUBLISH_ASSETS_SHEET_NAME || 'publish_assets' }}
      YOUTUBE_OAUTH_CLIENT_JSON: ${{ secrets.YOUTUBE_OAUTH_CLIENT_JSON }}
      YOUTUBE_OAUTH_REFRESH_TOKEN: ${{ secrets.YOUTUBE_OAUTH_REFRESH_TOKEN }}
      YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
      YOUTUBE_PRIVACY_STATUS: ${{ vars.YOUTUBE_PRIVACY_STATUS || 'private' }}
      YOUTUBE_CATEGORY_ID: ${{ vars.YOUTUBE_CATEGORY_ID || '28' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Publish YouTube Shorts
        run: python scripts/publish_to_youtube_shorts.py
