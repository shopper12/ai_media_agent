name: Generate short video files

on:
  workflow_dispatch:
  schedule:
    - cron: "40 1 * * 1"

permissions:
  contents: write

jobs:
  generate-short-videos:
    runs-on: ubuntu-latest
    env:
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
      PUBLISH_ASSETS_SHEET_NAME: ${{ vars.PUBLISH_ASSETS_SHEET_NAME || 'publish_assets' }}
      SHORT_VIDEO_OUT_DIR: generated/short_videos
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-noto-cjk

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate short video files
        run: python scripts/generate_short_video_assets.py

      - name: Commit generated video files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Generate short video files
          file_pattern: generated/short_videos/**
